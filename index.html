<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Peluang Dadu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <h2>Simulasi peluang pada pelemparan dadu</h2>
        
        <div class="main-layout">
            
            <div class="rolls-column">
                <div class="rolls-header">Rolls</div>
                <div id="diceContainer"></div>
            </div>

            <div class="data-column">
                
                <div class="controls">
                    <input type="number" id="numRolls" value="1" min="1" max="5000" placeholder="Jml Roll">
                    <button id="btnRoll" class="btn">Roll</button>
                    <button id="btnReset" class="btn reset">Reset</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Count</th>
                            <th>Total</th>
                            <th>Proportion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td id="count1">0</td>
                            <td id="totalRolls">0</td>
                            <td id="prop1">0.0000</td>
                        </tr>
                    </tbody>
                </table>

                <div class="tabs">
                    <div class="tab active" id="tabOutcomes">Outcomes</div>
                    <div class="tab" id="tabConvergence">Convergence</div>
                </div>

                <div class="chart-container" id="outcomesSection">
                    <div class="chart-wrapper">
                        <canvas id="outcomesChart"></canvas>
                    </div>
                </div>

                <div class="chart-container" id="convergenceSection" style="display: none;">
                    <div class="chart-wrapper">
                        <canvas id="convergenceChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
