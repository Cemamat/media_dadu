<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi peluang pada pelemparan dadu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h2>Simulasi peluang pada pelemparan dadu</h2>
        
        <div class="main-layout">
            <div class="rolls-column">
                <div class="rolls-header">Rolls</div>
                <div id="diceContainer">
                    </div>
            </div>

            <div class="data-column">
                <div class="controls">
                    <input type="number" id="numRolls" min="1" max="5000" value="1">
                    <button id="btnRoll" class="btn">Roll</button>
                    <button id="btnReset" class="btn reset">Reset</button>
                </div>

                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Count</th>
                            <th>Total</th>
                            <th>Proportion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td id="count1">0</td>
                            <td id="totalRolls">0</td>
                            <td id="prop1">0.0000</td>
                        </tr>
                    </tbody>
                </table>

                <div class="tabs">
                    <button id="tabOutcomes" class="tab active">Outcomes</button>
                    <button id="tabConvergence" class="tab">Convergence</button>
                </div>

                <div class="chart-container">
                    <div id="outcomesSection" class="chart-wrapper">
                        <canvas id="outcomesChart"></canvas>
                    </div>
                    <div id="convergenceSection" class="chart-wrapper" style="display: none;">
                        <canvas id="convergenceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
